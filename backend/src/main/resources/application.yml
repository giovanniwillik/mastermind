spring:
  application:
    name: mastermind

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/mastermind}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    initialization-mode: always

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      platform: postgresql

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:your-super-secure-secret-key-minimum-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    root: ${LOGGING_LEVEL:INFO}
    com.giovanni.mastermind: DEBUG

environment: ${ENVIRONMENT:development}

springdoc:
  swagger-ui:
    path: /swagger-ui.html