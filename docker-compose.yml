services:
  db:
    image: postgres:15
    container_name: mastermind-db
    environment:
      POSTGRES_DB: mastermind
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - mastermind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d mastermind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mastermind-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/mastermind}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-your-super-secure-secret-key-minimum-32-characters}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:4200}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - mastermind-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mastermind-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - mastermind-network
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:8080}

volumes:
  postgres_data:

networks:
  mastermind-network:
    driver: bridge