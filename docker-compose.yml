version: '3.9'

services:
  db:
    image: postgres:15
    container_name: mastermind-db
    environment:
      POSTGRES_DB: mastermind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mastermind-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mastermind-backend
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/mastermind
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      JWT_SECRET: mastermind-super-secret-key-2026-very-safe
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    networks:
      - mastermind-network

volumes:
  postgres_data:

networks:
  mastermind-network:
    driver: bridge